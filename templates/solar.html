<!DOCTYPE html>
<html>
<head>
    <title>Solar ROI Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<h2>☀️ Solar ROI Calculator</h2>

<form method="post">

<label>Monthly Electricity Usage (kWh)</label><br>
<input type="number" name="monthly_kwh" required>
<br><br>

<label>Electricity Rate (MMK/kWh)</label><br>
<input type="number" name="rate" required>
<br><br>

<label>Solar System Size (kW)</label><br>
<input type="number" step="0.1" name="solar_kw" required>
<br><br>

<label>Solar Installation Cost (MMK)</label><br>
<input type="number" name="cost" required>
<br><br>

<button type="submit">Calculate</button>

</form>


{% if result %}

<hr>

<h3>📊 Result</h3>

<p>Annual Electricity: {{result.annual_kwh}} kWh/year</p>

<p>Annual Solar Saving:
{{result.saving}} MMK/year</p>

<p>Payback Period:
{{result.payback}} years</p>

<p>ROI:
{{result.roi}} %</p>

{% endif %}

</body>
</html>
