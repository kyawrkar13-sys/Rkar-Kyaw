<!DOCTYPE html>
<html>
<head>
    <title>Generator Fuel Cost Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<h2>⚡ Generator Fuel Cost Calculator</h2>

<form method="post">

<label>Generator Capacity (kW)</label><br>
<input type="number" step="0.1" name="capacity" required>
<br><br>

<label>Running Hours per Day</label><br>
<input type="number" step="0.1" name="hours" required>
<br><br>

<label>Fuel Consumption (Liter/hour)</label><br>
<input type="number" step="0.01" name="fuel_rate" required>
<br><br>

<label>Fuel Price (MMK/Liter)</label><br>
<input type="number" name="fuel_price" required>
<br><br>

<label>Operating Days per Month</label><br>
<input type="number" name="days" required>
<br><br>

<button type="submit">Calculate</button>

</form>


{% if result %}

<hr>

<h3>📊 Result</h3>

<p>Daily Fuel:
{{result.daily_fuel}} Liter/day</p>

<p>Monthly Fuel:
{{result.monthly_fuel}} Liter/month</p>

<p>Monthly Fuel Cost:
{{result.monthly_cost}} MMK</p>

<p>Annual Fuel Cost:
{{result.annual_cost}} MMK</p>

{% endif %}

</body>
</html>
