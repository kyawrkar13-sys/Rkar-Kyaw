<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar + Generator ROI Analyzer</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
   
<link rel="icon" type="image/png" href="{{ url_for('static', filename='icon.png') }}">
</head>

<body>

<h1>📊☀️Solar + Generator ROI Analyzer</h1>
<div class="input-card">
<h2>☀️Solar System Input</h2>

<label>Full Load (kW)</label>
<input type="number" id="fullLoad">

<label>Inverter Power (kW)</label>
<input type="number" id="inverter">

<label>Solar Module Watt (Wp)</label>
<input type="number" id="moduleWp">

<label>Module Quantity</label>
<input type="number" id="moduleQty">

<label>Load / Inverter Ratio (%) - Auto</label>
<input type="number" id="solarPercent" readonly>

<label>Solar Daily Hour</label>
<input type="number" id="solarHour">
</div>
<div class="input-card">   
<h2>⚡EPC Input</h2>

<label>Electricity Unit Price (MMK)</label>
<input type="number" id="unitPrice">
</div>
<div class="input-card">
<h2>🔌Generator Input</h2>

<label>Generator Capacity (kVA)</label>
<input type="number" id="genCapacity">

<label>Fuel Consumption (Liter/Hour)</label>
<input type="number" id="fuelRate">

<label>Fuel Price (MMK/Liter)</label>
<input type="number" id="fuelPrice">

<label>Generator Backup Time (Hour)</label>
<input type="number" id="backupHour">

<label>Maintenance Cost (MMK)</label>
<input type="number" id="maintenance">


<h2>💰Investment</h2>

<label>Product Cost (MMK)</label>
<input type="number" id="productCost">

<label>Installation Cost (MMK)</label>
<input type="number" id="installCost">


<br><br>

<button onclick="calculate()">Calculate ROI</button>


<div id="result"></div>



    <script>

function calculate() {

    // =========================
    // INPUTS
    // =========================

    const fullLoad =
        Number(document.getElementById("fullLoad").value);

    const inverter =
        Number(document.getElementById("inverter").value);

    const moduleWp =
        Number(document.getElementById("moduleWp").value);

    const moduleQty =
        Number(document.getElementById("moduleQty").value);

    const solarHour =
        Number(document.getElementById("solarHour").value);

    const unitPrice =
        Number(document.getElementById("unitPrice").value);

    const fuelRate =
        Number(document.getElementById("fuelRate").value);

    const fuelPrice =
        Number(document.getElementById("fuelPrice").value);

    const backupHour =
        Number(document.getElementById("backupHour").value);

    const maintenance =
        Number(document.getElementById("maintenance").value);

    const productCost =
        Number(document.getElementById("productCost").value);

    const installCost =
        Number(document.getElementById("installCost").value);


    // =========================
    // SOLAR CALCULATION
    // =========================

    // PV Installed Size
    const solarSize =
        (moduleWp * moduleQty) / 1000;


   // Load / Inverter Ratio (%)
// Example: 15 / 60 × 100 = 25%
const solarPercent =
    (fullLoad / inverter) * 100;

document.getElementById("solarPercent").value =
    solarPercent.toFixed(2);


// Available usable solar power
// PV Size, Inverter Size, Full Load ထဲက
// အငယ်ဆုံး power ကို အသုံးပြုမယ်
const solarPower =
    Math.min(fullLoad, solarSize, inverter);


// Daily Solar Energy
const dailySolarEnergy =
    solarPower * solarHour;


    // Monthly EPC Units
    // Example: 52.5 × 30 = 1,575 Units
    const monthlyUnits =
        dailySolarEnergy * 30;


    // Monthly EPC Saving
    // Example: 1,575 × 900 = 1,417,500 MMK
    const monthlyEpcSaving =
        monthlyUnits * unitPrice;


    // Annual EPC Saving
    const annualEpcSaving =
        monthlyEpcSaving * 12;


    // =========================
    // GENERATOR CALCULATION
    // =========================

    const dailyFuel =
        fuelRate * backupHour;

    const dailyGeneratorCost =
        dailyFuel * fuelPrice;

    const monthlyGeneratorCost =
        dailyGeneratorCost * 30;

    const annualGeneratorCost =
        monthlyGeneratorCost * 12;

    const annualGeneratorSaving =
        annualGeneratorCost + maintenance;


    // =========================
    // TOTAL SAVING
    // =========================

    const annualTotalSaving =
        annualEpcSaving +
        annualGeneratorSaving;


    // =========================
    // INVESTMENT
    // =========================

    const totalInvestment =
        productCost +
        installCost;


    // =========================
    // PAYBACK
    // =========================

    const payback =
        totalInvestment /
        annualTotalSaving;


    // =========================
    // ROI TABLE
    // =========================

    let roiTable = "";

    for (let year = 1; year <= 12; year++) {

        const cumulativeSaving =
            annualTotalSaving * year;

        const netProfit =
            cumulativeSaving - totalInvestment;

        roiTable += `
            <tr>
                <td>${year}</td>
                <td>${totalInvestment.toLocaleString()}</td>
                <td>${cumulativeSaving.toLocaleString()}</td>
                <td>${netProfit.toLocaleString()}</td>
            </tr>
        `;
    }


    // =========================
    // RESULTS
    // =========================

    document.getElementById("result").innerHTML = `

        <h2>Solar Results</h2>

        <p>Solar PV Size:
        <strong>${solarSize.toFixed(2)} kWp</strong></p>

        <p>Solar Production:
        <strong>${solarPercent.toFixed(2)} %</strong></p>

        <p>Solar Production Power:
        <strong>${solarPower.toFixed(2)} kW</strong></p>
        <p>Daily Solar Energy:
        <strong>${dailySolarEnergy.toFixed(2)} kWh</strong></p>

        <p>Monthly EPC Unit:
        <strong>${monthlyUnits.toFixed(2)} Units</strong></p>

        <p>Monthly EPC Saving:
        <strong>${monthlyEpcSaving.toLocaleString()} MMK</strong></p>

        <p>Annual EPC Saving:
        <strong>${annualEpcSaving.toLocaleString()} MMK</strong></p>


        <h2>Generator Results</h2>

        <p>Daily Fuel:
        <strong>${dailyFuel.toFixed(2)} Liters</strong></p>

        <p>Daily Generator Cost:
        <strong>${dailyGeneratorCost.toLocaleString()} MMK</strong></p>

        <p>Monthly Generator Cost:
        <strong>${monthlyGeneratorCost.toLocaleString()} MMK</strong></p>

        <p>Annual Generator Operation Cost:
        <strong>${annualGeneratorSaving.toLocaleString()} MMK</strong></p>


        <h2>ROI Results</h2>

        <p>Total Annual Saving:
        <strong>${annualTotalSaving.toLocaleString()} MMK</strong></p>

        <p>Total Investment:
        <strong>${totalInvestment.toLocaleString()} MMK</strong></p>

        <p>Payback Period:
        <strong>${payback.toFixed(2)} Years</strong></p>


        <table border="1" cellpadding="8">

            <tr>
                <th>Year</th>
                <th>Investment</th>
                <th>ROI (MMK)</th>
                <th>Net Profit (MMK)</th>
            </tr>

            ${roiTable}

        </table>
    `;
}

</script>
</body>
</html>
